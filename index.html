// day
h+=`<div class="day-content" id="dc"><div class="day-head"><div><h2 style="color:${d.color}">${x(d.title)}</h2><p class="sub">${x(d.subtitle)}</p>`;
if(dt>0)h+=`<span style="font-size:10px;font-weight:700;color:${d.color}">💸 $${dt.toFixed(2)}</span>`;
h+=`</div>`;if(dc>0)h+=`<button style="background:none;border:1px solid #ddd;border-radius:6px;padding:3px 8px;font-size:9px;font-weight:700;color:#aaa;cursor:pointer" onclick="rd()">Desmarcar</button>`;
h+=`</div><div class="day-prog"><div class="track"><div class="fill" style="width:${(dc/Math.max(d.stops.length,1))*100}%;background:${d.color}"></div></div><span>${dc}/${d.stops.length}</span></div>`;
// stops
d.stops.forEach((s,i)=>{const dn=!!S.ck[s.id],im=S._mv&&S._mv.d===S.ad&&S._mv.i===i,ie=S._ed===s.id;
h+=`<div class="stop ${dn?"done":""}"><div class="left"><span class="time">${x(s.time)}</span>`;
h+=`<button class="chk" style="border:${dn?"none":"2.5px solid "+d.color};background:${dn?d.color:"transparent"}" onclick="tc('${s.id}')">`;
if(dn)h+=`<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2.5 6.5L5 9L9.5 3.5" stroke="${d.darkText?"#111":"#fff"}" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
h+=`</button>`;
if(!dn&&d.stops.length>1){h+=`<div class="reorder">`;if(i>0)h+=`<button onclick="ro(${i},${i-1})">▲</button>`;if(i<d.stops.length-1)h+=`<button onclick="ro(${i},${i+1})">▼</button>`;h+=`</div>`}
h+=`</div><div class="right">`;
if(!ie){h+=`<div class="name-row">`;
if(s.cid)h+=`<a class="nm" href="https://maps.google.com/?cid=${s.cid}" target="_blank" rel="noopener" style="text-decoration:${dn?"line-through":"none"};border-bottom:${dn?"none":"2px solid "+d.color}">${x(s.name)}</a>`;
else h+=`<span class="nm" style="text-decoration:${dn?"line-through":"none"};border-bottom:${dn?"none":"2px solid "+d.color}">${x(s.name)}</span>`;
if(s.tag)h+=`<span class="tag" style="background:${d.color};color:${d.darkText?"#111":"#fff"}">${x(s.tag)}</span>`;
if(s.custom)h+=`<span class="ctag">TUYO</span>`;h+=`</div>`;
if(s.note)h+=`<p class="note">${x(s.note)}</p>`;
if(!dn)h+=`<div class="acts"><button onclick="se('${s.id}',${i})">✏️ editar</button><button onclick="sm(${i})">📦 mover</button><button class="del" onclick="rs(${i})">🗑️ quitar</button></div>`;
if(im){h+=`<div class="mvp" style="border:2px solid ${d.color}"><div class="t">Mover a:</div><div class="opts">`;
S.days.forEach((dd,di)=>{if(di!==S.ad)h+=`<button style="background:${dd.color};color:${dd.darkText?"#111":"#fff"}" onclick="ms(${di})">${dd.label}</button>`});
h+=`<button style="background:#eee;color:#888" onclick="cm()">Cancelar</button></div></div>`}
}else{const ed=S._edd||{};
h+=`<div class="ef"><div class="r"><input style="flex:0 0 50px;border:2px solid ${d.color}" value="${x(ed.time||"")}" oninput="S._edd.time=this.value" placeholder="Hora"><input style="flex:1;border:2px solid ${d.color};font-weight:700;min-width:0" value="${x(ed.name||"")}" oninput="S._edd.name=this.value" placeholder="Nombre"></div><input style="border:2px solid #ddd" value="${x(ed.note||"")}" oninput="S._edd.note=this.value" placeholder="Nota..."><input style="border:2px solid #ddd" value="${x(ed.tag||"")}" oninput="S._edd.tag=this.value" placeholder="Etiqueta"><div class="bb"><button style="background:${d.color};color:${d.darkText?"#111":"#fff"}" onclick="sve(${i})">Guardar</button><button style="background:#eee;color:#888" onclick="ce()">Cancelar</button></div></div>`}
h+=`</div></div>`});
// add
if(S._ag){h+=`<div class="af"><div class="t" style="color:${d.color}">+ Nueva parada en ${d.label}</div><div class="r"><input style="flex:0 0 58px;border:2px solid ${d.color}" id="nt" placeholder="Hora"><input style="flex:1;border:2px solid ${d.color};font-weight:700;min-width:0" id="nn" placeholder="Nombre" onkeydown="if(event.key==='Enter')as()"></div><input class="full" style="border:2px solid #ddd" id="nno" placeholder="Nota (opcional)"><div class="bb"><button style="background:${d.color};color:${d.darkText?"#111":"#fff"};font-size:12px" onclick="as()">Añadir</button><button style="background:#eee;color:#888;font-size:12px" onclick="S._ag=false;R()">Cancelar</button></div></div>`}
else h+=`<button class="add-btn" onclick="S._ag=true;R()">+ Añadir parada a ${x(d.label)}</button>`;
// nav
const pv=S.ad>0,nx=S.ad<S.days.length-1;
h+=`<div class="nav"><button class="${pv?"":"dis"}" onclick="${pv?"gd("+(S.ad-1)+")":""}">← ${pv?S.days[S.ad-1].label:""}</button><span class="mid">desliza</span><button class="${nx?"":"dis"}" onclick="${nx?"gd("+(S.ad+1)+")":""}">${nx?S.days[S.ad+1].label:""} →</button></div>`;
h+=`</div></div>`;document.getElementById("app").innerHTML=h;
const p=document.getElementById("pills");if(p&&p.children[S.ad])p.children[S.ad].scrollIntoView({behavior:"smooth",inline:"center",block:"nearest"});}

// actions
function tp(p){S.pn=S.pn===p?null:p;sv();R()}
function gd(i){S.ad=i;S._ag=false;S._mv=null;S._ed=null;sv();R()}
function tc(id){S.ck[id]?delete S.ck[id]:S.ck[id]=true;sv();R()}
function rd(){S.days[S.ad].stops.forEach(s=>delete S.ck[s.id]);sv();R()}
function ro(f,t){const st=S.days[S.ad].stops;const[it]=st.splice(f,1);st.splice(t,0,it);sv();R()}
function sm(i){S._mv={d:S.ad,i};R()}
function cm(){S._mv=null;R()}
function ms(di){const m=S._mv;if(!m)return;const st=S.days[m.d].stops.splice(m.i,1)[0];S.days[di].stops.push(st);S._mv=null;sv();R()}
function rs(i){S.days[S.ad].stops.splice(i,1);sv();R()}
function se(sid,i){const s=S.days[S.ad].stops[i];S._ed=sid;S._edd={time:s.time,name:s.name,note:s.note||"",tag:s.tag||""};R()}
function ce(){S._ed=null;R()}
function sve(i){const s=S.days[S.ad].stops[i],e=S._edd;s.time=e.time;s.name=e.name;s.note=e.note;s.tag=e.tag||undefined;S._ed=null;sv();R()}
function as(){const t=document.getElementById("nt").value,n=document.getElementById("nn").value,no=document.getElementById("nno").value;if(!n.trim())return;S.days[S.ad].stops.push({id:gi(),time:t||"—",name:n.trim(),note:no.trim(),cid:"",custom:true});S._ag=false;sv();R()}
function ae(){const ea=document.getElementById("ea"),ed=document.getElementById("ed"),a=parseFloat((ea.value||"").replace(",","."));if(!a||a<=0)return;const c=S._ec||"food",ds=ed.value||EC.find(e=>e.id===c)?.label||"",did=S.days[S.ad].id;if(!S.ex[did])S.ex[did]=[];S.ex[did].push({amount:a,desc:ds,cat:c,ts:Date.now()});sv();R()}
function re(did,i){S.ex[did].splice(i,1);if(!S.ex[did].length)delete S.ex[did];sv();R()}

// swipe
let tx=0,ty=0;
document.addEventListener("touchstart",e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY});
document.addEventListener("touchend",e=>{const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;if(Math.abs(dx)>50&&Math.abs(dx)>Math.abs(dy)*1.3){if(dx<0&&S.ad<S.days.length-1)gd(S.ad+1);if(dx>0&&S.ad>0)gd(S.ad-1)}});

ld();R();

// ── Service Worker registration ──
if("serviceWorker"in navigator){
  navigator.serviceWorker.register("sw.js").catch(()=>{});
}
</script>
</body>
</html>

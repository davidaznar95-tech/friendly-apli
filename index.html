const today=isT(),nm=today?nowM():-1;
let h=`<div style="max-width:480px;margin:0 auto">`;

h+=`<div class="hdr"><div class="hdr-r"><div><div class="kk">NYC · 23–29 ago 2026 <span class="sd ${fbOk?"on":"off"}"></span></div><h1>Tu itinerario</h1></div><div class="bs">
<button class="b ${U.pn==="bk"?"on":""}" onclick="U.pn=U.pn==='bk'?null:'bk';R()">⚡Reservas</button>
<button class="b ${U.pn==="ex"?"on":""}" onclick="U.pn=U.pn==='ex'?null:'ex';R()">💸Gastos</button>
<button class="b ${U.pn==="cfg"?"on":""}" onclick="U.pn=U.pn==='cfg'?null:'cfg';R()">⚙️</button>
</div></div><div class="pb"><div class="t"><div class="f" style="width:${(tc/Math.max(ts,1))*100}%"></div></div><span>${tc}/${ts}</span></div></div>`;

if(U.pn==="bk"){h+=`<div class="pn pn-bk"><h3>Reservas:</h3>`;BK.forEach(b=>{const dk=D.bk[b.id];h+=`<div class="bi ${dk?"dk":""}" onclick="D.bk['${b.id}']=D.bk['${b.id}']?false:true;save();R()"><span>${b.u?"🔴":"🟡"}</span><span>${dk?"☑":"☐"} ${x(b.item)}</span></div>`});h+=`</div>`}

if(U.pn==="ex"){const g=gt(),mx=Math.max(...D.days.map(dd=>tbd(dd.id)),1),rate=D.cfg?.eur||0;
h+=`<div class="pn pn-ex"><div class="et"><span class="l">Total</span><div><span class="v">$${g.toFixed(2)}</span>`;if(rate>0)h+=`<span class="v2">~€${(g*rate).toFixed(2)}</span>`;
h+=`</div></div><div class="eb">`;D.days.forEach(dd=>{const t=tbd(dd.id);h+=`<div class="c"><div class="br"><div class="bf" style="height:${Math.max((t/mx)*100,t>0?8:0)}%;background:${dd.color}"></div></div><span class="dl">${dd.short}</span></div>`});h+=`</div>`;
h+=`<div class="ecs">`;EC.forEach(c=>{const t=tbc(c.id);if(t>0)h+=`<span style="background:${c.color}18;color:${c.color}">${c.label.split(" ")[0]} $${t.toFixed(0)}</span>`});h+=`</div>`;
h+=`<div class="ei"><input class="a" type="number" inputmode="decimal" placeholder="$" id="ea"><input class="d" type="text" placeholder="Concepto..." id="ed" onkeydown="if(event.key==='Enter')addExp()"><button class="bt" onclick="addExp()">+</button></div>`;
h+=`<div class="ecb">`;EC.forEach(c=>{const sl=c.id===U.ec;h+=`<button style="border:2px solid ${sl?c.color:"#e8e8e8"};background:${sl?c.color+"18":"transparent"};color:${sl?c.color:"#999"}" onclick="U.ec='${c.id}';R()">${x(c.label)}</button>`});h+=`</div>`;
h+=`<div class="el">`;D.days.forEach(dd=>{const exs=D.ex[dd.id]||[];if(!exs.length)return;h+=`<div class="edl" style="color:${dd.color}">${dd.label} · $${tbd(dd.id).toFixed(2)}</div>`;exs.forEach((e,i)=>{const ct=EC.find(c=>c.id===e.cat);h+=`<div class="er"><div class="i"><span class="c2">${ct?ct.label.split(" ")[0]:""}</span><span class="ds">${x(e.desc)}</span></div><div class="rt"><span class="am">$${e.amount.toFixed(2)}</span><button class="rm" onclick="rmExp('${dd.id}',${i})">×</button></div></div>`})});
if(g===0)h+=`<div style="text-align:center;padding:12px;font-size:12px;color:#ccc">Añade tu primer gasto</div>`;h+=`</div></div>`}

if(U.pn==="cfg"){h+=`<div class="pn pn-cfg"><h3>Ajustes</h3>`;
h+=`<div class="cfg-row"><span class="lbl">1 USD = EUR</span><input type="number" inputmode="decimal" value="${D.cfg?.eur||0.92}" onchange="D.cfg.eur=parseFloat(this.value)||0;save();R()"></div>`;
h+=`<div class="cfg-row"><span class="lbl">Sync</span><span style="font-size:12px">${fbOk?'🟢 Conectado':'🔴 Offline'}</span></div>`;
h+=`<div class="cfg-row" style="border-bottom:none"><span class="lbl" style="color:#EE352E">Reset</span><button onclick="if(confirm('¿Borrar todo?')){D={days:JSON.parse(JSON.stringify(INIT)),ck:{},ex:{},bk:{},cfg:{eur:0.92},nid:200};_n=200;save();R()}">Resetear</button></div></div>`}

// PILLS
h+=`<div class="pls" id="pls">`;D.days.forEach((dd,i)=>{const a=i===U.ad,dn=dd.stops.filter(s=>D.ck[s.id]).length,cm=dn===dd.stops.length&&dd.stops.length>0,fg=a?(dd.darkText?"#111":"#fff"):dd.color;
const it=(()=>{const n=new Date(),k=n.getFullYear()+"-"+String(n.getMonth()+1).padStart(2,"0")+"-"+String(n.getDate()).padStart(2,"0");return DM[k]===dd.id})();
h+=`<button class="pl" onclick="goDay(${i})" style="opacity:${cm&&!a?.45:1}"><div class="ci" style="background:${a?dd.color:"transparent"};border:${a?"none":"2.5px solid "+dd.color};color:${fg}">${cm?"✓":dd.short}</div><span class="lb" style="color:${a?"#111":"#aaa"}">${dd.label}</span>`;
if(it&&!a)h+=`<div style="position:absolute;top:0;right:2px;width:6px;height:6px;border-radius:50%;background:#EE352E"></div>`;
if(dn>0&&!cm)h+=`<div class="mc"><div class="mf" style="width:${(dn/dd.stops.length)*100}%;background:${dd.color}"></div></div>`;h+=`</button>`});h+=`</div>`;

// DAY
h+=`<div class="dc" id="dc"><div class="dh"><div><h2 style="color:${d.color}">${x(d.title)}</h2><p class="su">${x(d.subtitle)}</p>`;
if(dt>0){h+=`<span style="font-size:10px;font-weight:700;color:${d.color}">💸 $${dt.toFixed(2)}`;if(D.cfg?.eur>0)h+=` · €${(dt*D.cfg.eur).toFixed(2)}`;h+=`</span>`}
h+=`</div>`;if(dc>0)h+=`<button style="background:none;border:1px solid #ddd;border-radius:6px;padding:3px 8px;font-size:9px;font-weight:700;color:#aaa;cursor:pointer" onclick="uncheckDay()">Desmarcar</button>`;
h+=`</div><div class="dp"><div class="t"><div class="f" style="width:${(dc/Math.max(d.stops.length,1))*100}%;background:${d.color}"></div></div><span>${dc}/${d.stops.length}</span></div>`;

// STOPS
let ni=false;
d.stops.forEach((s,i)=>{const dn=!!D.ck[s.id],im=U.mv&&U.mv.d===U.ad&&U.mv.i===i,ie=U.ed===s.id,sm=t2m(s.time),nx=i<d.stops.length-1?t2m(d.stops[i+1].time):-1;
if(today&&!ni&&nm>=0&&sm>=0&&nm<sm){h+=`<div class="nl"><div class="nd"></div><span class="nlb">Ahora · ${m2s(nm)}</span></div>`;ni=true}
h+=`<div class="st ${dn?"dn":""}"><div class="le"><span class="tm">${x(s.time)}</span>`;
h+=`<button class="ck" style="border:${dn?"none":"2.5px solid "+d.color};background:${dn?d.color:"transparent"}" onclick="togChk('${s.id}')">`;
if(dn)h+=`<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2.5 6.5L5 9L9.5 3.5" stroke="${d.darkText?"#111":"#fff"}" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
h+=`</button>`;if(!dn&&d.stops.length>1){h+=`<div class="ro">`;if(i>0)h+=`<button onclick="reorder(${i},${i-1})">▲</button>`;if(i<d.stops.length-1)h+=`<button onclick="reorder(${i},${i+1})">▼</button>`;h+=`</div>`}
h+=`</div><div class="ri">`;
if(!ie){h+=`<div class="nr">`;
if(s.cid)h+=`<a class="nm" href="https://maps.google.com/?cid=${s.cid}" target="_blank" style="text-decoration:${dn?"line-through":"none"};border-bottom:${dn?"none":"2px solid "+d.color}">${x(s.name)}</a>`;
else h+=`<span class="nm" style="text-decoration:${dn?"line-through":"none"};border-bottom:${dn?"none":"2px solid "+d.color}">${x(s.name)}</span>`;
if(s.tag)h+=`<span class="tg" style="background:${d.color};color:${d.darkText?"#111":"#fff"}">${x(s.tag)}</span>`;
if(s.custom)h+=`<span class="ct">TUYO</span>`;h+=`</div>`;
if(s.note)h+=`<p class="nt">${x(s.note)}</p>`;
if(s.link)h+=`<div class="lk">🔗 <a href="${x(s.link)}" target="_blank">Reserva</a></div>`;
if(!dn){h+=`<div class="ac">`;
if(s.cid)h+=`<button class="dr" onclick="window.open('https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(s.name)}&destination_place_id=${s.cid}&travelmode=transit','_blank')">🧭 llegar</button>`;
h+=`<button onclick="startEdit('${s.id}',${i})">✏️</button><button onclick="startMove(${i})">📦</button><button class="dl" onclick="rmStop(${i})">🗑️</button></div>`}
if(im){h+=`<div class="mv" style="border:2px solid ${d.color}"><div class="tt">Mover a:</div><div class="op">`;
D.days.forEach((dd,di)=>{if(di!==U.ad)h+=`<button style="background:${dd.color};color:${dd.darkText?"#111":"#fff"}" onclick="doMove(${di})">${dd.label}</button>`});
h+=`<button style="background:#eee;color:#888" onclick="U.mv=null;R()">✕</button></div></div>`}
}else{const ed=U.edd;
h+=`<div class="ef"><div class="r"><input style="flex:0 0 50px;border:2px solid ${d.color}" value="${x(ed.time)}" oninput="U.edd.time=this.value" placeholder="Hora"><input style="flex:1;border:2px solid ${d.color};font-weight:700;min-width:0" value="${x(ed.name)}" oninput="U.edd.name=this.value" placeholder="Nombre"></div><input style="border:2px solid #ddd" value="${x(ed.note)}" oninput="U.edd.note=this.value" placeholder="Nota"><input style="border:2px solid #ddd" value="${x(ed.tag)}" oninput="U.edd.tag=this.value" placeholder="Etiqueta"><input style="border:2px solid #ddd" value="${x(ed.link)}" oninput="U.edd.link=this.value" placeholder="🔗 URL reserva"><div class="bb"><button style="background:${d.color};color:${d.darkText?"#111":"#fff"}" onclick="saveEdit(${i})">OK</button><button style="background:#eee;color:#888" onclick="U.ed=null;R()">✕</button></div></div>`}
h+=`</div></div>`;
if(today&&!ni&&nm>=0&&sm>=0&&nm>=sm&&(nx<0||nm<nx)){h+=`<div class="nl"><div class="nd"></div><span class="nlb">Ahora · ${m2s(nm)}</span></div>`;ni=true}
});
if(today&&!ni&&nm>=0)h+=`<div class="nl"><div class="nd"></div><span class="nlb">Ahora · ${m2s(nm)}</span></div>`;

// ADD
if(U.ag){h+=`<div class="af"><div class="tt" style="color:${d.color}">+ Nueva parada</div><div class="r"><input style="flex:0 0 58px;border:2px solid ${d.color}" id="at" placeholder="Hora"><input style="flex:1;border:2px solid ${d.color};font-weight:700;min-width:0" id="an" placeholder="Nombre" onkeydown="if(event.key==='Enter')addStop()"></div><input class="fl" style="border:2px solid #ddd" id="ano" placeholder="Nota"><input class="fl" style="border:2px solid #ddd" id="alk" placeholder="🔗 URL reserva"><div class="bb"><button style="background:${d.color};color:${d.darkText?"#111":"#fff"}" onclick="addStop()">Añadir</button><button style="background:#eee;color:#888" onclick="U.ag=false;R()">✕</button></div></div>`}
else h+=`<button class="ab" onclick="U.ag=true;R()">+ Añadir parada</button>`;

const pv=U.ad>0,nxx=U.ad<D.days.length-1;
h+=`<div class="nv"><button class="${pv?"":"dis"}" onclick="${pv?"goDay("+(U.ad-1)+")":""}">← ${pv?D.days[U.ad-1].label:""}</button><span class="mid">desliza</span><button class="${nxx?"":"dis"}" onclick="${nxx?"goDay("+(U.ad+1)+")":""}">${nxx?D.days[U.ad+1].label:""} →</button></div>`;
h+=`</div></div>`;
document.getElementById("app").innerHTML=h;
const p=document.getElementById("pls");if(p&&p.children[U.ad])p.children[U.ad].scrollIntoView({behavior:"smooth",inline:"center",block:"nearest"});
}

// ═══ ACTIONS ═══
function goDay(i){U.ad=i;U.ag=false;U.mv=null;U.ed=null;R()}
function togChk(id){D.ck[id]?delete D.ck[id]:D.ck[id]=true;save();R()}
function uncheckDay(){D.days[U.ad].stops.forEach(s=>delete D.ck[s.id]);save();R()}
function reorder(f,t){const st=D.days[U.ad].stops,[it]=st.splice(f,1);st.splice(t,0,it);save();R()}
function startMove(i){U.mv={d:U.ad,i};R()}
function doMove(di){const m=U.mv;if(!m)return;const st=D.days[m.d].stops.splice(m.i,1)[0];D.days[di].stops.push(st);U.mv=null;save();R()}
function rmStop(i){if(!confirm("¿Quitar?"))return;D.days[U.ad].stops.splice(i,1);save();R()}
function startEdit(sid,i){const s=D.days[U.ad].stops[i];U.ed=sid;U.edd={time:s.time,name:s.name,note:s.note||"",tag:s.tag||"",link:s.link||""};R()}
function saveEdit(i){const s=D.days[U.ad].stops[i],e=U.edd;s.time=e.time;s.name=e.name;s.note=e.note;s.tag=e.tag||undefined;s.link=e.link||undefined;U.ed=null;save();R()}
function addStop(){const t=document.getElementById("at").value,n=document.getElementById("an").value,no=document.getElementById("ano").value,lk=document.getElementById("alk")?.value||"";if(!n.trim())return;D.days[U.ad].stops.push({id:gi(),time:t||"—",name:n.trim(),note:no.trim(),link:lk.trim()||undefined,cid:"",custom:true});U.ag=false;D.nid=_n;save();R()}
function addExp(){const ea=document.getElementById("ea"),ed=document.getElementById("ed"),a=parseFloat((ea.value||"").replace(",","."));if(!a||a<=0)return;const c=U.ec,ds=ed.value||EC.find(e=>e.id===c)?.label||"",did=D.days[U.ad].id;if(!D.ex[did])D.ex[did]=[];D.ex[did].push({amount:a,desc:ds,cat:c,ts:Date.now()});save();R()}
function rmExp(did,i){D.ex[did].splice(i,1);if(!D.ex[did].length)delete D.ex[did];save();R()}

// SWIPE
let tx=0,ty=0;
document.addEventListener("touchstart",e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY});
document.addEventListener("touchend",e=>{const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;if(Math.abs(dx)>50&&Math.abs(dx)>Math.abs(dy)*1.3){if(dx<0&&U.ad<D.days.length-1)goDay(U.ad+1);if(dx>0&&U.ad>0)goDay(U.ad-1)}});

// ═══ INIT ═══
autoDay();startSync();
setInterval(()=>{if(isT())R()},60000);
if("serviceWorker"in navigator)navigator.serviceWorker.register("sw.js").catch(()=>{});
</script>
</body>
</html>

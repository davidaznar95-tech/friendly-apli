function nowMins(){const nyc=new Date(new Date().toLocaleString("en-US",{timeZone:"America/New_York"}));return nyc.getHours()*60+nyc.getMinutes()}
function timeToMins(t){const p=t.match(/(\d+)[:\.](\d+)/);if(!p)return-1;return parseInt(p[1])*60+parseInt(p[2])}
function minsToStr(m){return String(Math.floor(m/60)).padStart(2,"0")+":"+String(m%60).padStart(2,"0")}
function isToday(){const now=new Date(),key=now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0")+"-"+String(now.getDate()).padStart(2,"0");return DM[key]===S.days[S.ad]?.id}

// ═══ RENDER ═══
function R(){
const d=S.days[S.ad],ts=S.days.reduce((s,dd)=>s+dd.stops.length,0),tc=Object.keys(S.ck).length,dc=d.stops.filter(s=>S.ck[s.id]).length,dt=tbd(d.id);
const today=isToday(),nm=today?nowMins():-1;
let h=`<div style="max-width:480px;margin:0 auto">`;

// HEADER
h+=`<div class="hdr"><div class="hdr-r"><div><div class="kk">NYC · 23–29 ago 2026 <span class="sync-dot ${fbConnected?"sync-on":"sync-off"}"></span></div><h1>Tu itinerario</h1></div><div class="bs">
<button class="b ${S.pn==="bk"?"on":""}" onclick="tp('bk')">${S.pn==="bk"?"✕":"⚡Reservas"}</button>
<button class="b ${S.pn==="ex"?"on":""}" onclick="tp('ex')">${S.pn==="ex"?"✕":"💸Gastos"}</button>
<button class="b ${S.pn==="cfg"?"on":""}" onclick="tp('cfg')">${S.pn==="cfg"?"✕":"⚙️"}</button>
</div></div><div class="pb"><div class="t"><div class="f" style="width:${(tc/Math.max(ts,1))*100}%"></div></div><span>${tc}/${ts}</span></div></div>`;

// BOOKINGS
if(S.pn==="bk"){h+=`<div class="pn pn-bk"><h3>Reservas por urgencia:</h3>`;BK.forEach(b=>{const done=S.bk[b.id];h+=`<div class="bi ${done?"done-bk":""}" onclick="tbk('${b.id}')"><span>${b.u?"🔴":"🟡"}</span><span>${done?"☑":"☐"} ${x(b.item)}</span></div>`});h+=`</div>`}

// EXPENSES
if(S.pn==="ex"){const g=gt(),mx=Math.max(...S.days.map(dd=>tbd(dd.id)),1),rate=S.cfg?.eur||0;
h+=`<div class="pn pn-ex"><div class="et"><span class="l">Total viaje</span><div><span class="v">$${g.toFixed(2)}</span>`;
if(rate>0)h+=`<span class="v2">~€${(g*rate).toFixed(2)}</span>`;
h+=`</div></div><div class="eb">`;S.days.forEach(dd=>{const t=tbd(dd.id);h+=`<div class="c"><div class="br"><div class="bf" style="height:${Math.max((t/mx)*100,t>0?8:0)}%;background:${dd.color}"></div></div><span class="dl">${dd.short}</span></div>`});h+=`</div>`;
h+=`<div class="ecs">`;EC.forEach(c=>{const t=tbc(c.id);if(t>0)h+=`<span style="background:${c.color}18;color:${c.color}">${c.label.split(" ")[0]} $${t.toFixed(0)}</span>`});h+=`</div>`;
h+=`<div class="ei"><input class="a" type="number" inputmode="decimal" placeholder="$" id="ea"><input class="d" type="text" placeholder="Concepto..." id="ed" onkeydown="if(event.key==='Enter')ae()"><button class="btn" onclick="ae()">+</button></div>`;
h+=`<div class="ecb">`;EC.forEach(c=>{const sl=c.id===(S._ec||"food");h+=`<button style="border:2px solid ${sl?c.color:"#e8e8e8"};background:${sl?c.color+"18":"transparent"};color:${sl?c.color:"#999"}" onclick="S._ec='${c.id}';R()">${x(c.label)}</button>`});h+=`</div>`;
h+=`<div class="el">`;S.days.forEach(dd=>{const exs=S.ex[dd.id]||[];if(!exs.length)return;h+=`<div class="edl" style="color:${dd.color}">${dd.label} · $${tbd(dd.id).toFixed(2)}</div>`;exs.forEach((e,i)=>{const ct=EC.find(c=>c.id===e.cat);h+=`<div class="er"><div class="i"><span class="ct">${ct?ct.label.split(" ")[0]:""}</span><span class="ds">${x(e.desc)}</span></div><div class="rt"><span class="am">$${e.amount.toFixed(2)}</span><button class="rm" onclick="re('${dd.id}',${i})">×</button></div></div>`})});
if(g===0)h+=`<div style="text-align:center;padding:12px 0;font-size:12px;color:#ccc">Añade tu primer gasto</div>`;h+=`</div></div>`}

// SETTINGS
if(S.pn==="cfg"){h+=`<div class="pn pn-cfg"><h3>Ajustes</h3>`;
h+=`<div class="cfg-row"><span class="lbl">1 USD = EUR</span><input type="number" inputmode="decimal" value="${S.cfg?.eur||0.92}" onchange="S.cfg.eur=parseFloat(this.value)||0;fbWrite();R()"></div>`;
h+=`<div class="cfg-row"><span class="lbl">Sync</span><span style="font-size:12px">${fbConnected?'🟢 Conectado en tiempo real':'🔴 Sin conexión (modo local)'}</span></div>`;
h+=`<div class="cfg-row" style="border-bottom:none"><span class="lbl" style="color:#EE352E">Resetear todo</span><button onclick="if(confirm('¿Seguro? Se borran checks, gastos y paradas añadidas')){S=defaults();fbWrite();R()}">Resetear</button></div>`;
h+=`</div>`}

// PILLS
h+=`<div class="pls" id="pls">`;S.days.forEach((dd,i)=>{const a=i===S.ad,dn=dd.stops.filter(s=>S.ck[s.id]).length,cm=dn===dd.stops.length&&dd.stops.length>0,fg=a?(dd.darkText?"#111":"#fff"):dd.color;
const it=(()=>{const now=new Date(),key=now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0")+"-"+String(now.getDate()).padStart(2,"0");return DM[key]===dd.id})();
h+=`<button class="pl" onclick="gd(${i})" style="opacity:${cm&&!a?.45:1}"><div class="ci" style="background:${a?dd.color:"transparent"};border:${a?"none":"2.5px solid "+dd.color};color:${fg}">${cm?"✓":dd.short}</div><span class="lb" style="color:${a?"#111":"#aaa"}">${dd.label}</span>`;
if(it&&!a)h+=`<div style="position:absolute;top:0;right:2px;width:6px;height:6px;border-radius:50%;background:#EE352E"></div>`;
if(dn>0&&!cm)h+=`<div class="mc"><div class="mf" style="width:${(dn/dd.stops.length)*100}%;background:${dd.color}"></div></div>`;h+=`</button>`});h+=`</div>`;

// DAY CONTENT
h+=`<div class="dc" id="dc"><div class="dh"><div><h2 style="color:${d.color}">${x(d.title)}</h2><p class="su">${x(d.subtitle)}</p>`;
if(dt>0){h+=`<span style="font-size:10px;font-weight:700;color:${d.color}">💸 $${dt.toFixed(2)}`;if(S.cfg?.eur>0)h+=` · €${(dt*S.cfg.eur).toFixed(2)}`;h+=`</span>`}
h+=`</div>`;if(dc>0)h+=`<button style="background:none;border:1px solid #ddd;border-radius:6px;padding:3px 8px;font-size:9px;font-weight:700;color:#aaa;cursor:pointer" onclick="rd()">Desmarcar</button>`;
h+=`</div><div class="dp"><div class="t"><div class="f" style="width:${(dc/Math.max(d.stops.length,1))*100}%;background:${d.color}"></div></div><span>${dc}/${d.stops.length}</span></div>`;

// STOPS
let ni=false;
d.stops.forEach((s,i)=>{const dn=!!S.ck[s.id],im=S._mv&&S._mv.d===S.ad&&S._mv.i===i,ie=S._ed===s.id,sm2=timeToMins(s.time),nx2=i<d.stops.length-1?timeToMins(d.stops[i+1].time):-1;
if(today&&!ni&&nm>=0&&sm2>=0&&nm<sm2){h+=`<div class="now-line"><div class="now-dot"></div><span class="now-lbl">Ahora · ${minsToStr(nm)}</span></div>`;ni=true}
h+=`<div class="st ${dn?"dn":""}"><div class="le"><span class="tm">${x(s.time)}</span>`;
h+=`<button class="ck" style="border:${dn?"none":"2.5px solid "+d.color};background:${dn?d.color:"transparent"}" onclick="tc('${s.id}')">`;
if(dn)h+=`<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2.5 6.5L5 9L9.5 3.5" stroke="${d.darkText?"#111":"#fff"}" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
h+=`</button>`;if(!dn&&d.stops.length>1){h+=`<div class="ro">`;if(i>0)h+=`<button onclick="ro(${i},${i-1})">▲</button>`;if(i<d.stops.length-1)h+=`<button onclick="ro(${i},${i+1})">▼</button>`;h+=`</div>`}
h+=`</div><div class="ri">`;
if(!ie){h+=`<div class="nr">`;
if(s.cid)h+=`<a class="nm" href="https://maps.google.com/?cid=${s.cid}" target="_blank" rel="noopener" style="text-decoration:${dn?"line-through":"none"};border-bottom:${dn?"none":"2px solid "+d.color}">${x(s.name)}</a>`;
else h+=`<span class="nm" style="text-decoration:${dn?"line-through":"none"};border-bottom:${dn?"none":"2px solid "+d.color}">${x(s.name)}</span>`;
if(s.tag)h+=`<span class="tg" style="background:${d.color};color:${d.darkText?"#111":"#fff"}">${x(s.tag)}</span>`;
if(s.custom)h+=`<span class="cst">TUYO</span>`;h+=`</div>`;
if(s.note)h+=`<p class="nt">${x(s.note)}</p>`;
if(s.link)h+=`<div class="lnk">🔗 <a href="${x(s.link)}" target="_blank" rel="noopener">Reserva / enlace</a></div>`;
if(!dn){h+=`<div class="ac">`;
if(s.cid)h+=`<button class="dir" onclick="window.open('https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(s.name)}&destination_place_id=${s.cid}&travelmode=transit','_blank')">🧭 llegar</button>`;
h+=`<button onclick="se('${s.id}',${i})">✏️ editar</button><button onclick="smv(${i})">📦 mover</button><button class="dl" onclick="rs(${i})">🗑️</button></div>`}
if(im){h+=`<div class="mv" style="border:2px solid ${d.color}"><div class="tt">Mover a:</div><div class="op">`;
S.days.forEach((dd,di)=>{if(di!==S.ad)h+=`<button style="background:${dd.color};color:${dd.darkText?"#111":"#fff"}" onclick="ms(${di})">${dd.label}</button>`});
h+=`<button style="background:#eee;color:#888" onclick="cm()">Cancelar</button></div></div>`}
}else{const ed=S._edd||{};
h+=`<div class="ef"><div class="r"><input style="flex:0 0 50px;border:2px solid ${d.color}" value="${x(ed.time)}" oninput="S._edd.time=this.value" placeholder="Hora"><input style="flex:1;border:2px solid ${d.color};font-weight:700;min-width:0" value="${x(ed.name)}" oninput="S._edd.name=this.value" placeholder="Nombre"></div><input style="border:2px solid #ddd" value="${x(ed.note)}" oninput="S._edd.note=this.value" placeholder="Nota..."><input style="border:2px solid #ddd" value="${x(ed.tag)}" oninput="S._edd.tag=this.value" placeholder="Etiqueta"><input style="border:2px solid #ddd" value="${x(ed.link)}" oninput="S._edd.link=this.value" placeholder="🔗 URL reserva"><div class="bb"><button style="background:${d.color};color:${d.darkText?"#111":"#fff"}" onclick="sve(${i})">Guardar</button><button style="background:#eee;color:#888" onclick="ce()">Cancelar</button></div></div>`}
h+=`</div></div>`;
if(today&&!ni&&nm>=0&&sm2>=0&&nm>=sm2&&(nx2<0||nm<nx2)){h+=`<div class="now-line"><div class="now-dot"></div><span class="now-lbl">Ahora · ${minsToStr(nm)}</span></div>`;ni=true}
});
if(today&&!ni&&nm>=0)h+=`<div class="now-line"><div class="now-dot"></div><span class="now-lbl">Ahora · ${minsToStr(nm)}</span></div>`;

// ADD STOP
if(S._ag){h+=`<div class="af"><div class="tt" style="color:${d.color}">+ Nueva parada en ${d.label}</div><div class="r"><input style="flex:0 0 58px;border:2px solid ${d.color}" id="nt" placeholder="Hora"><input style="flex:1;border:2px solid ${d.color};font-weight:700;min-width:0" id="nn" placeholder="Nombre" onkeydown="if(event.key==='Enter')as()"></div><input class="fl" style="border:2px solid #ddd" id="nno" placeholder="Nota (opcional)"><input class="fl" style="border:2px solid #ddd" id="nlk" placeholder="🔗 URL reserva (opcional)"><div class="bb"><button style="background:${d.color};color:${d.darkText?"#111":"#fff"};font-size:12px" onclick="as()">Añadir</button><button style="background:#eee;color:#888;font-size:12px" onclick="S._ag=false;R()">Cancelar</button></div></div>`}
else h+=`<button class="ab" onclick="S._ag=true;R()">+ Añadir parada a ${x(d.label)}</button>`;

const pv=S.ad>0,nxx=S.ad<S.days.length-1;
h+=`<div class="nv"><button class="${pv?"":"dis"}" onclick="${pv?"gd("+(S.ad-1)+")":""}">← ${pv?S.days[S.ad-1].label:""}</button><span class="mid">desliza</span><button class="${nxx?"":"dis"}" onclick="${nxx?"gd("+(S.ad+1)+")":""}">${nxx?S.days[S.ad+1].label:""} →</button></div>`;
h+=`</div></div>`;
document.getElementById("app").innerHTML=h;
const p=document.getElementById("pls");if(p&&p.children[S.ad])p.children[S.ad].scrollIntoView({behavior:"smooth",inline:"center",block:"nearest"});
}

// ═══ ACTIONS ═══
function tp(p){S.pn=S.pn===p?null:p;R()}
function gd(i){S.ad=i;S._ag=false;S._mv=null;S._ed=null;R()}
function tc(id){S.ck[id]?delete S.ck[id]:S.ck[id]=true;fbWrite();R()}
function rd(){S.days[S.ad].stops.forEach(s=>delete S.ck[s.id]);fbWrite();R()}
function tbk(id){S.bk[id]?delete S.bk[id]:S.bk[id]=true;fbWrite();R()}
function ro(f,t){const st=S.days[S.ad].stops;const[it]=st.splice(f,1);st.splice(t,0,it);fbWrite();R()}
function smv(i){S._mv={d:S.ad,i};R()}
function cm(){S._mv=null;R()}
function ms(di){const m=S._mv;if(!m)return;const st=S.days[m.d].stops.splice(m.i,1)[0];S.days[di].stops.push(st);S._mv=null;fbWrite();R()}
function rs(i){if(!confirm("¿Quitar esta parada?"))return;S.days[S.ad].stops.splice(i,1);fbWrite();R()}
function se(sid,i){const s=S.days[S.ad].stops[i];S._ed=sid;S._edd={time:s.time,name:s.name,note:s.note||"",tag:s.tag||"",link:s.link||""};R()}
function ce(){S._ed=null;R()}
function sve(i){const s=S.days[S.ad].stops[i],e=S._edd;s.time=e.time;s.name=e.name;s.note=e.note;s.tag=e.tag||undefined;s.link=e.link||undefined;S._ed=null;fbWrite();R()}
function as(){const t=document.getElementById("nt").value,n=document.getElementById("nn").value,no=document.getElementById("nno").value,lk=document.getElementById("nlk")?.value||"";if(!n.trim())return;S.days[S.ad].stops.push({id:gi(),time:t||"—",name:n.trim(),note:no.trim(),link:lk.trim()||undefined,cid:"",custom:true});S._ag=false;S.nid=_n;fbWrite();R()}
function ae(){const ea=document.getElementById("ea"),ed=document.getElementById("ed"),a=parseFloat((ea.value||"").replace(",","."));if(!a||a<=0)return;const c=S._ec||"food",ds=ed.value||EC.find(e=>e.id===c)?.label||"",did=S.days[S.ad].id;if(!S.ex[did])S.ex[did]=[];S.ex[did].push({amount:a,desc:ds,cat:c,ts:Date.now()});fbWrite();R()}
function re(did,i){S.ex[did].splice(i,1);if(!S.ex[did].length)delete S.ex[did];fbWrite();R()}

// SWIPE
let tx=0,ty=0;
document.addEventListener("touchstart",e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY});
document.addEventListener("touchend",e=>{const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;if(Math.abs(dx)>50&&Math.abs(dx)>Math.abs(dy)*1.3){if(dx<0&&S.ad<S.days.length-1)gd(S.ad+1);if(dx>0&&S.ad>0)gd(S.ad-1)}});

// ═══ INIT ═══
init();autoDay();R();fbListen();
setInterval(()=>{if(isToday())R()},60000);
if("serviceWorker"in navigator)navigator.serviceWorker.register("sw.js").catch(()=>{});
</script>
</body>
</html>
